<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <title>Passing Thoughts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>PASSING THOUGHTS</h1>
        <p class="subtitle">
            read it. think about it. let it pass.
        </p>
        <p id="counter">87 thoughts remaining</p>

        <div class="thought-box" id="thoughtBox">
            <p id="thought"></p>
        </div>

        <button onclick="newThought()">
            Let it pass →
        </button>

        <button id="restartBtn"
onclick="restartThoughts()">

Restart Journey

</button>

<button onclick="toggleFavorite()">

♡

</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
